<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: #0f172a;
        color: white;
        overflow-x: hidden;
    }

    header {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    h1 {
        font-size: 3rem;
        animation: fadeIn 2s ease-in-out;
    }

    p {
        margin-top: 10px;
        color: #94a3b8;
        animation: fadeIn 3s ease-in-out;
    }

    nav {
        position: fixed;
        top: 0;
        width: 100%;
        background: rgba(15,23,42,0.8);
        backdrop-filter: blur(10px);
        padding: 15px;
        display: flex;
        justify-content: center;
        gap: 20px;
    }

    nav a {
        color: white;
        text-decoration: none;
        transition: 0.3s;
    }

    nav a:hover {
        color: #38bdf8;
    }

    section {
        padding: 100px 20px;
        text-align: center;
    }

    .card {
        background: #1e293b;
        padding: 20px;
        margin: 20px auto;
</html>
